name: Build and deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

# Official GitHub Pages deployment: build → upload artifact → deploy-pages.
# This replaces the old force-push-to-gh-pages method, which left GitHub's CDN
# serving a stale copy after each deploy. deploy-pages properly invalidates it.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
